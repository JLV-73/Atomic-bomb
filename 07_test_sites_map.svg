<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="Inter, Arial, sans-serif">
  <rect width="1000" height="500" fill="#0a0e17"/>
  <text x="500" y="35" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="700">Sites d'essais nucléaires dans le monde (1945-2017)</text>
  <!-- North America -->
  <path d="M100,100 Q120,80 160,85 Q200,75 230,90 Q250,100 260,130 Q255,160 240,180 Q220,200 200,210 Q170,220 150,210 Q120,200 110,170 Q100,140 100,100Z" fill="#0d1a2a" stroke="#1a3050" stroke-width="0.8"/>
  <!-- South America -->
  <path d="M210,240 Q230,230 245,240 Q260,260 255,300 Q250,340 240,370 Q225,390 215,380 Q200,350 195,310 Q195,270 210,240Z" fill="#0d1a2a" stroke="#1a3050" stroke-width="0.8"/>
  <!-- Europe -->
  <path d="M430,90 Q460,80 490,85 Q520,90 530,100 Q535,120 520,130 Q500,135 480,130 Q460,125 445,115 Q435,105 430,90Z" fill="#0d1a2a" stroke="#1a3050" stroke-width="0.8"/>
  <!-- Africa -->
  <path d="M440,160 Q470,150 500,155 Q520,165 525,200 Q520,250 510,290 Q495,320 475,330 Q455,325 445,300 Q435,260 435,220 Q435,180 440,160Z" fill="#0d1a2a" stroke="#1a3050" stroke-width="0.8"/>
  <!-- Asia -->
  <path d="M540,70 Q600,60 660,65 Q720,70 770,85 Q800,100 810,130 Q800,160 770,170 Q730,175 690,170 Q650,165 620,150 Q580,135 560,115 Q545,95 540,70Z" fill="#0d1a2a" stroke="#1a3050" stroke-width="0.8"/>
  <!-- Australia -->
  <path d="M740,280 Q770,270 800,275 Q820,285 825,310 Q820,335 800,345 Q775,350 755,340 Q740,325 738,305 Q738,290 740,280Z" fill="#0d1a2a" stroke="#1a3050" stroke-width="0.8"/>
  <!-- Test sites with animated pulses -->
  <circle cx="145" cy="135" r="8" fill="#ff4444" opacity="0.7"><animate attributeName="r" values="6;10;6" dur="3s" repeatCount="indefinite"/></circle>
  <text x="145" y="155" text-anchor="middle" fill="#ff6666" font-size="8" font-weight="500">Nevada (928)</text>
  <circle cx="820" cy="210" r="6" fill="#ff4444" opacity="0.6"/>
  <text x="820" y="225" text-anchor="middle" fill="#ff6666" font-size="7">Marshall (67)</text>
  <circle cx="640" cy="105" r="7" fill="#4488ff" opacity="0.7"><animate attributeName="r" values="5;9;5" dur="3.5s" repeatCount="indefinite"/></circle>
  <text x="640" y="95" text-anchor="middle" fill="#6699ff" font-size="8" font-weight="500">Semipalatinsk (456)</text>
  <circle cx="560" cy="55" r="6" fill="#4488ff" opacity="0.6"/>
  <text x="560" y="48" text-anchor="middle" fill="#6699ff" font-size="7">Novaya Zemlya (130)</text>
  <circle cx="460" cy="195" r="5" fill="#ffaa00" opacity="0.7"/>
  <text x="460" y="210" text-anchor="middle" fill="#ffcc44" font-size="7">Sahara (17)</text>
  <circle cx="880" cy="340" r="5" fill="#ffaa00" opacity="0.6"/>
  <text x="880" y="355" text-anchor="middle" fill="#ffcc44" font-size="7">Mururoa (193)</text>
  <circle cx="770" cy="300" r="4" fill="#44cc88" opacity="0.6"/>
  <text x="770" y="315" text-anchor="middle" fill="#66ddaa" font-size="7">Australie (12)</text>
  <circle cx="700" cy="115" r="5" fill="#cc44cc" opacity="0.7"/>
  <text x="700" y="130" text-anchor="middle" fill="#dd66dd" font-size="7">Lop Nor (45)</text>
  <circle cx="660" cy="175" r="4" fill="#44cccc" opacity="0.6"/>
  <text x="660" y="190" text-anchor="middle" fill="#66dddd" font-size="7">Pokhran (6)</text>
  <circle cx="640" cy="165" r="3" fill="#cc8844" opacity="0.6"/>
  <text x="625" y="175" text-anchor="end" fill="#ddaa66" font-size="7">Chagai (6)</text>
  <circle cx="750" cy="120" r="3" fill="#ff44ff" opacity="0.6"/>
  <text x="765" y="118" fill="#ff66ff" font-size="7">Punggye-ri (6)</text>
  <!-- Legend -->
  <rect x="30" y="400" width="200" height="90" rx="6" fill="#0d1520" stroke="#1a3050" stroke-width="0.8"/>
  <text x="40" y="418" fill="#ccc" font-size="10" font-weight="600">Puissances nucléaires</text>
  <circle cx="48" cy="432" r="4" fill="#ff4444"/><text x="58" y="436" fill="#aaa" font-size="9">USA (1 032 essais)</text>
  <circle cx="48" cy="448" r="4" fill="#4488ff"/><text x="58" y="452" fill="#aaa" font-size="9">URSS/Russie (715)</text>
  <circle cx="48" cy="464" r="4" fill="#ffaa00"/><text x="58" y="468" fill="#aaa" font-size="9">France (210)</text>
  <circle cx="48" cy="480" r="4" fill="#44cc88"/><text x="58" y="484" fill="#aaa" font-size="9">Royaume-Uni (45)</text>
  <circle cx="155" cy="432" r="4" fill="#cc44cc"/><text x="165" y="436" fill="#aaa" font-size="9">Chine (45)</text>
  <circle cx="155" cy="448" r="4" fill="#44cccc"/><text x="165" y="452" fill="#aaa" font-size="9">Inde (6)</text>
  <circle cx="155" cy="464" r="4" fill="#cc8844"/><text x="165" y="468" fill="#aaa" font-size="9">Pakistan (6)</text>
  <circle cx="155" cy="480" r="4" fill="#ff44ff"/><text x="165" y="484" fill="#aaa" font-size="9">Corée du Nord (6)</text>
  <text x="970" y="480" text-anchor="end" fill="#555" font-size="10">Total : 2 056 essais nucléaires (1945-2017)</text>
</svg>