<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Inter, Arial, sans-serif">
  <defs>
    <radialGradient id="zone1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ff4400" stop-opacity="0.9"/><stop offset="100%" stop-color="#ff4400" stop-opacity="0.2"/></radialGradient>
    <radialGradient id="zone2" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ff8800" stop-opacity="0.7"/><stop offset="100%" stop-color="#ff8800" stop-opacity="0.1"/></radialGradient>
    <radialGradient id="zone3" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffcc00" stop-opacity="0.5"/><stop offset="100%" stop-color="#ffcc00" stop-opacity="0.05"/></radialGradient>
