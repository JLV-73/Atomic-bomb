  <circle cx="400" cy="320" r="180" fill="url(#zone3)" stroke="#ffcc00" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="400" cy="320" r="120" fill="url(#zone2)" stroke="#ff8800" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="400" cy="320" r="60" fill="url(#zone1)" stroke="#ff4400" stroke-width="1.5" stroke-opacity="0.7"/>
  <circle cx="400" cy="320" r="8" fill="#fff" opacity="0.9"/>
