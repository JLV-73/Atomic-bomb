  </defs>
  <rect width="800" height="600" fill="#0a0a0f"/>
  <text x="400" y="40" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="700">Zones d'effets concentriques — Arme de 1 Mt (altitude optimale)</text>
